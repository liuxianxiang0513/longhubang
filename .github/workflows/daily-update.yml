name: 樱花龙虎榜每日更新

on:
  schedule:
    # 每天 18:00 北京时间 (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install akshare --quiet

      - name: 获取龙虎榜数据 & 构建页面
        run: |
          python .github/scripts/build.py index.html

      - name: 提交更新
        run: |
          git config user.name "樱花龙虎榜 Bot"
          git config user.email "bot@longhubang.local"
          git add index.html
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "🌸 每日自动更新 $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
            git push
            echo "✅ pushed"
          fi
