<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 樱花龙虎榜</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #fce4ec 60%, #fff0f5 100%);
  min-height: 100vh;
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 960px;
  width: 100%;
  background: rgba(255,255,255,0.92);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(233,30,99,0.12), 0 2px 8px rgba(0,0,0,0.06);
  padding: 24px 28px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(244,143,177,0.3);
}

/* 标题 */
.header {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px dashed #f8bbd0;
}
.header h1 {
  font-size: 28px;
  color: #d81b60;
  letter-spacing: 4px;
  text-shadow: 1px 1px 2px rgba(216,27,96,0.2);
  font-weight: 700;
}
.header .subtitle {
  font-size: 13px;
  color: #ad1457;
  margin-top: 4px;
  opacity: 0.8;
}

/* 概览条 */
.overview {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 12px 20px;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  border-radius: 12px;
  border: 1px solid #f48fb1;
}
.ov-item {
  text-align: center;
}
.ov-value {
  font-size: 18px;
  font-weight: 700;
  color: #880e4f;
}
.ov-label {
  font-size: 11px;
  color: #ad1457;
  opacity: 0.8;
}

/* 加载/错误 */
.status-msg {
  text-align: center;
  padding: 40px;
  color: #ad1457;
  font-size: 14px;
}
.status-msg.loading {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.error {
  color: #c62828;
  background: #ffebee;
  border-radius: 8px;
  padding: 12px;
  margin: 10px 0;
}
.server-info {
  font-size: 12px;
  color: #999;
  margin-top: 8px;
}
.server-info a { color: #d81b60; }

/* 游资卡片 */
.trader-card {
  background: #fff;
  border: 1.5px solid #f8bbd0;
  border-radius: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.trader-card:hover {
  box-shadow: 0 4px 20px rgba(233,30,99,0.1);
}

.trader-header {
  display: flex;
  align-items: center;
  padding: 12px 18px;
  background: linear-gradient(135deg, #fce4ec, #fff0f5);
  border-bottom: 1px solid #f8bbd0;
  gap: 12px;
}
.trader-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f48fb1, #f06292);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  flex-shrink: 0;
}
.trader-name {
  font-size: 16px;
  font-weight: 700;
  color: #880e4f;
  flex: 1;
}
.stock-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 400;
  background: #fce4ec;
  color: #d81b60;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
  vertical-align: middle;
}
.more-hint {
  text-align: center;
  font-size: 11px;
  color: #bbb;
  padding: 4px 0;
}
.trader-stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
}
.trader-stats .buy { color: #d32f2f; }
.trader-stats .sell { color: #2e7d32; }
.trader-stats .net { color: #d81b60; font-weight: 700; }

/* 买卖模块 */
.trade-modules {
  display: flex;
  gap: 12px;
  padding: 12px 18px;
}
.buy-module, .sell-module {
  flex: 1;
  min-width: 0;
}
.module-title {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.buy-title { color: #d32f2f; }
.sell-title { color: #2e7d32; }

.trade-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 8px;
  margin-bottom: 2px;
  border-radius: 6px;
  font-size: 13px;
  background: #fafafa;
}
.trade-item .stock-code {
  font-weight: 600;
  color: #333;
  min-width: 60px;
}
.trade-item .stock-name {
  color: #666;
  flex: 1;
  margin-left: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.trade-item .amount {
  font-weight: 600;
  white-space: nowrap;
}
.amount.positive { color: #d32f2f; }
.amount.negative { color: #2e7d32; }

.module-divider {
  width: 1px;
  background: linear-gradient(to bottom, transparent, #f8bbd0, transparent);
  flex-shrink: 0;
}

/* 底部 */
.footer {
  text-align: center;
  padding: 12px;
  font-size: 11px;
  color: #ad1457;
  opacity: 0.6;
  margin-top: 8px;
}

/* 导出按钮 */
.btn-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid #f48fb1;
  background: #fff;
  color: #d81b60;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover {
  background: #fce4ec;
  transform: translateY(-1px);
}
.btn:active {
  transform: scale(0.97);
}
.btn-primary {
  background: linear-gradient(135deg, #f48fb1, #f06292);
  color: #fff;
  border-color: transparent;
}
.btn-primary:hover {
  background: linear-gradient(135deg, #f06292, #e91e63);
}

/* 响应式 */
@media (max-width: 640px) {
  .container { padding: 16px 12px; }
  .header h1 { font-size: 22px; }
  .trade-modules { flex-direction: column; }
  .module-divider { display: none; }
}
</style>
</head>

function fmtAmount(num) {
  if (num == null || isNaN(num)) return '-';
  const abs = Math.abs(num);
  if (abs >= 1e8) return (num / 1e8).toFixed(2) + '亿';
  if (abs >= 1e4) return (num / 1e4).toFixed(0) + '万';
  return num.toString();
}

function fmtAmountFull(num) {
  if (num == null || isNaN(num)) return '-万';
  const abs = Math.abs(num);
  if (abs >= 1e8) return (num / 1e8).toFixed(2) + '亿';
  return (num / 1e4).toFixed(0) + '万';
}

async function fetchLiveData() {
  const resp = await fetch(`${API_BASE}/api/lhb`, { signal: AbortSignal.timeout(15000) });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return await resp.json();
}

function render(data) {
  const overview = data.overview || {};
  const detail = data.detail || {};
  const traders = detail.traders || [];
  
  if (overview.error && overview.stock_count === 0) {
    document.getElementById('status-msg').className = 'status-msg error';
    document.getElementById('status-msg').textContent = '⚠️ ' + overview.error;
    return;
  }

  document.getElementById('status-msg').style.display = 'none';
  
  const ds = overview.date || '--';
  const displayDate = ds.length === 8 ? `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}` : ds;
  document.getElementById('date-label').textContent = `📅 ${displayDate} · 更新于 ${overview.update || '--'}`;
  
  document.getElementById('ov-traders').textContent = traders.length || 0;
  document.getElementById('ov-stocks').textContent = overview.stock_count || detail.stocks_scanned || 0;
  document.getElementById('ov-buy').textContent = fmtAmount(detail.total_buy);
  document.getElementById('ov-sell').textContent = fmtAmount(detail.total_sell);
  document.getElementById('ov-net').textContent = fmtAmount(detail.total_net);

  const list = document.getElementById('trader-list');
  if (!traders || traders.length === 0) {
    list.innerHTML = '<div class="status-msg">暂无游资数据</div>';
    return;
  }

  list.innerHTML = traders.map((t, i) => {
    const avatar = t.name.charAt(0);
    const topStocks = (t.stocks || []).sort((a,b) => b.net - a.net).slice(0, 8);
    const buys = topStocks.filter(s => s.net > 0).sort((a,b) => b.net - a.net);
    const sells = topStocks.filter(s => s.net < 0).sort((a,b) => a.net - b.net);
    
    return `
    <div class="trader-card">
      <div class="trader-header">
        <div class="trader-avatar">${avatar}</div>
        <div class="trader-name">${t.name}<span class="stock-badge">${t.stock_count || 0}只股</span></div>
        <div class="trader-stats">
          <span class="buy">买 ${fmtAmount(t.total_buy)}</span>
          <span class="sell">卖 ${fmtAmount(t.total_sell)}</span>
          <span class="net">净 ${fmtAmount(t.total_net)}</span>
        </div>
      </div>
      <div class="trade-modules">
        <div class="buy-module">
          <div class="module-title buy-title">🔴 净买入</div>
          ${buys.length > 0 
            ? buys.map(s => `
              <div class="trade-item">
                <span class="stock-name">${s.code}</span>
                <span class="amount positive">+${fmtAmountFull(s.net)}</span>
              </div>`).join('')
            : '<div class="trade-item"><span class="stock-name" style="color:#aaa">--</span></div>'}
        </div>
        <div class="module-divider"></div>
        <div class="sell-module">
          <div class="module-title sell-title">🟢 净卖出</div>
          ${sells.length > 0
            ? sells.map(s => `
              <div class="trade-item">
                <span class="stock-name">${s.code}</span>
                <span class="amount negative">${fmtAmountFull(s.net)}</span>
              </div>`).join('')
            : '<div class="trade-item"><span class="stock-name" style="color:#aaa">--</span></div>'}
        </div>
      </div>
      ${t.stocks.length > 8 ? `<div class="more-hint">还有 ${t.stocks.length - 8} 笔交易未显示</div>` : ''}
    </div>`;
  }).join('');
}

async function refreshData() {
  if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
    document.getElementById('status-msg').className = 'status-msg error';
    document.getElementById('status-msg').textContent = '信息 每日18:00自动更新，请稍后刷新页面';
    document.getElementById('status-msg').style.display = 'block';
    setTimeout(() => { document.getElementById('status-msg').style.display = 'none'; }, 3000);
    return;
  }
  try {
    document.getElementById('status-msg').className = 'status-msg loading';
    document.getElementById('status-msg').textContent = '🔄 正在刷新...';
    document.getElementById('status-msg').style.display = 'block';
    await fetch(`${API_BASE}/api/refresh`, { signal: AbortSignal.timeout(20000) });
    await new Promise(r => setTimeout(r, 5000));
    await loadData();
  } catch (e) {
    document.getElementById('status-msg').className = 'status-msg error';
    document.getElementById('status-msg').textContent = '⚠️ 刷新失败';
    setTimeout(() => loadData(), 2000);
  }
}

async function exportImage() {
  const el = document.getElementById('main-content');
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ 导出中...';
  btn.disabled = true;
  try {
    const canvas = await html2canvas(el, {
      backgroundColor: null, scale: 2, useCORS: true, logging: false,
    });
    const link = document.createElement('a');
    link.download = `樱花龙虎榜_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('导出失败: ' + e.message);
  }
  btn.textContent = '📸 一键导出图片';
  btn.disabled = false;
}

// 启动
loadData();
